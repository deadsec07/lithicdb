name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to publish, for example v0.1.0'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: lithicdb-linux-x86_64
            archive_name: lithicdb-linux-x86_64.tar.gz
          - os: macos-latest
            artifact_name: lithicdb-macos-arm64
            archive_name: lithicdb-macos-arm64.tar.gz
          - os: windows-latest
            artifact_name: lithicdb-windows-x86_64
            archive_name: lithicdb-windows-x86_64.zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release

      - name: Build release binaries
        run: cargo build --release --bin lithicdb --bin benchmark

      - name: Package Unix artifacts
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist/${{ matrix.artifact_name }}
          cp target/release/lithicdb dist/${{ matrix.artifact_name }}/
          cp target/release/benchmark dist/${{ matrix.artifact_name }}/
          cp README.md dist/${{ matrix.artifact_name }}/
          tar -C dist -czf dist/${{ matrix.archive_name }} ${{ matrix.artifact_name }}

      - name: Package Windows artifacts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist/${{ matrix.artifact_name }} -Force | Out-Null
          Copy-Item target/release/lithicdb.exe dist/${{ matrix.artifact_name }}/
          Copy-Item target/release/benchmark.exe dist/${{ matrix.artifact_name }}/
          Copy-Item README.md dist/${{ matrix.artifact_name }}/
          Compress-Archive -Path dist/${{ matrix.artifact_name }} -DestinationPath dist/${{ matrix.archive_name }} -Force

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.archive_name }}

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Resolve tag
        id: meta
        shell: bash
        run: |
          if [[ '${{ github.event_name }}' == 'workflow_dispatch' ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          files: release-artifacts/*/*
